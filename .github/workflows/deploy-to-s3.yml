name: Deploy to S3 and CloudFront

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  AWS_REGION: 'us-east-2'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        NEXT_PUBLIC_AWS_REGION: ${{ secrets.NEXT_PUBLIC_AWS_REGION }}
        NEXT_PUBLIC_AWS_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_AWS_USER_POOL_ID }}
        NEXT_PUBLIC_AWS_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AWS_CLIENT_ID }}
        MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
        MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
        CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Sync files to S3
      run: |
        aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} --delete --cache-control "public, max-age=31536000" --exclude "*.html"
        aws s3 sync out/ s3://${{ secrets.S3_BUCKET_NAME }} --delete --cache-control "public, max-age=0" --include "*.html"

    - name: Invalidate CloudFront cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

    - name: Deployment success notification
      run: |
        echo "✅ Deployment completed successfully!"
        echo "🌐 Website URL: https://${{ secrets.DOMAIN_NAME }}"
        echo "📦 S3 Bucket: ${{ secrets.S3_BUCKET_NAME }}"
        echo "🚀 CloudFront Distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" 