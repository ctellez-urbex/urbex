name: Enforce branch naming to developer

on:
  pull_request:
    branches:
      - developer

jobs:
  enforce-naming:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch name
        run: |
          echo "Checking source branch: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" == fix/* || "${{ github.head_ref }}" == feature/* ]]; then
            echo "✅ Branch name is valid."
          else
            echo "❌ Only 'fix/*' or 'feature/*' branches can merge into developer."
            exit 1
          fi
